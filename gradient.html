<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Color Generator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Helvetia", sans-serif, serif;
        color: white;
        box-sizing: border-box;
        font-weight: 500;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: linear-gradient(to right, #f847a2, #0cb2d5);
      }

      .container {
        width: 300px;
        height: 200px;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
      }

      .btns {
        width: 250px;
        display: flex;
        justify-content: space-between;
      }

      button {
        border: 1px solid white;
        width: 100px;
        height: 30px;
        border-radius: 10px;
        background-color: rgb(39, 50, 59);
        box-shadow: 1px 0px 5px rgb(65, 65, 65);
      }

      .codeCopy {
        background-color: rgba(255, 255, 255, 0.3);
        text-align: center;
        height: 70px;
        width: 250px;
        align-content: center;
        padding: 10px;
        border-left: 4px solid rgb(39, 50, 59);
        border-top-right-radius: 10px;
        border-bottom-right-radius: 10px;
        font-weight: 500;
        font-size: 14px;
        line-height: auto;
      }

      .parent {
        background: orange;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="btns">
        <button id="btn1">#52025b</button>
        <button id="btn2">#dsd552</button>
      </div>
      <span>Double Click to Copy Code</span>
      <div class="codeCopy">background-image: linear</div>
    </div>
    <h1>Hello</h1>

    <script>
      let btn1 = document.querySelector("#btn1");
      let btn2 = document.querySelector("#btn2");
      let codeCopy = document.querySelector(".codeCopy");

      let getColor = () => {
        let colorValues = "0123456789abcdef";
        let color = "#";
        for (let i = 0; i < 6; i++) {
          color = color + colorValues[Math.floor(Math.random() * 16)];
        }
        return color;
      };

      let handleClickOne = () => {
        rgb1 = getColor();
        btn1.style.backgroundColor = rgb1;
        btn1.innerHTML = `${rgb1}`;
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
        console.log(rgb1);
        codeCopy.innerText = `backgroundImage = linear-gradient(to right, ${rgb1}, ${rgb2})`;
        console.log(rgb2);
      };

      let handleClickTwo = () => {
        rgb2 = getColor();
        btn2.style.backgroundColor = rgb2;
        btn2.innerHTML = `${rgb2}`;
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
        codeCopy.innerText = `backgroundImage = linear-gradient(to right, ${rgb1}, ${rgb2})`;
        console.log(rgb2);
      };

      btn1.addEventListener("click", handleClickOne);
      btn2.addEventListener("click", handleClickTwo);

      codeCopy.addEventListener("dblclick", () => {
        navigator.clipboard.writeText(codeCopy.innerText);
        alert("Color Code Copied!");
      });
    </script>
    <script src="./randomGenerate.js"></script>
  </body>
</html>
